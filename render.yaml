services:
  - type: web
    name: rent-bike-cox-backend
    runtime: node
    region: oregon
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: SSLCOMMERZ_STORE_ID
        sync: false
      - key: SSLCOMMERZ_STORE_PASS
        sync: false
      - key: SSLCOMMERZ_IS_LIVE
        value: false
      - key: BACKEND_URL
        value: https://rent-bike-cox-backend.onrender.com
      - key: FRONTEND_URL
        value: https://your-app.vercel.app
